name: FortressFlow CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

# ============================================================
# Job 1: Lint + Type-Check
# ============================================================
jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend lint/type tools
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy types-passlib types-python-jose

      - name: Ruff lint (backend)
        working-directory: backend
        run: ruff check . --output-format=github

      - name: Ruff format check (backend)
        working-directory: backend
        run: ruff format --check .

      - name: Mypy type check (backend)
        working-directory: backend
        continue-on-error: true
        run: mypy app --ignore-missing-imports --no-error-summary

      # ── Frontend ─────────────────────────────────────────
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Next.js lint
        working-directory: frontend
        continue-on-error: true
        run: npm run lint

      - name: TypeScript type check
        working-directory: frontend
        continue-on-error: true
        run: npx tsc --noEmit

# ============================================================
# Job 2: Backend Tests
# ============================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fortressflow_test
          POSTGRES_USER: fortressflow
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fortressflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://fortressflow:test_password@localhost:5432/fortressflow_test
      REDIS_URL: redis://localhost:6379/0
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      SECRET_KEY: test-secret-key-for-ci-only-not-production
      UNSUBSCRIBE_HMAC_KEY: test-hmac-key-for-ci-only
      ENVIRONMENT: testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov coverage[toml]

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run pytest with coverage
        working-directory: backend
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=30 \
            -v \
            --tb=short \
            --asyncio-mode=auto

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: backend/coverage.xml
          retention-days: 14

# ============================================================
# Job 3: Frontend Tests (Jest + Playwright E2E)
# ============================================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run Vitest unit tests
        working-directory: frontend
        run: npm test -- --reporter=default || true

      - name: Upload Jest coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build Next.js for E2E
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: e2e-test-secret-not-for-production
          BACKEND_URL: http://localhost:8000
        run: npm run build

      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          CI: "true"
          NEXT_TELEMETRY_DISABLED: "1"
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: e2e-test-secret-not-for-production
        run: npx playwright test e2e/

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

# ============================================================
# Job 4: Security Scan
# ============================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Backend: pip-audit ────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Backend dependency audit (pip-audit)
        working-directory: backend
        continue-on-error: true
        run: |
          pip-audit \
            --requirement requirements.txt \
            --output json \
            --format json \
            > pip-audit-results.json || true
          pip-audit \
            --requirement requirements.txt \
            --strict || true

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: backend/pip-audit-results.json
          retention-days: 14

      # ── Frontend: npm audit ───────────────────────────────
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Frontend dependency audit (npm audit)
        working-directory: frontend
        continue-on-error: true
        run: |
          npm audit \
            --audit-level=high \
            --json > npm-audit-results.json || true
          npm audit --audit-level=high || true

      - name: Upload npm audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-results
          path: frontend/npm-audit-results.json
          retention-days: 14

      # ── Container: Trivy ──────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: false
          load: true
          tags: fortressflow/backend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan — backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fortressflow/backend:scan
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy backend results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && hashFiles('trivy-backend.sarif') != '' }}
        continue-on-error: true
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Build frontend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: fortressflow/frontend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan — frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fortressflow/frontend:scan
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy frontend results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && hashFiles('trivy-frontend.sarif') != '' }}
        continue-on-error: true
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

# ============================================================
# Job 5: Build + Push Docker Images (main branch only)
# ============================================================
  build-and-push:
    name: Build & Push Images
    needs: [lint-and-type-check, backend-tests, frontend-tests, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Extract Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/frontend
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Image digest summary
        run: |
          echo "### Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.IMAGE_PREFIX }}/backend\` | \`${{ github.sha }}\` + \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.IMAGE_PREFIX }}/frontend\` | \`${{ github.sha }}\` + \`latest\` |" >> $GITHUB_STEP_SUMMARY

# ============================================================
# Job 6: Deploy to Production (main branch only)
# ============================================================
  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT || 22 }}
          script: |
            set -euo pipefail

            cd /opt/fortressflow

            echo "→ Pulling latest compose file..."
            git fetch origin main
            git reset --hard origin/main

            echo "→ Logging in to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "→ Pulling updated images..."
            IMAGE_TAG=${{ github.sha }} \
              docker compose -f docker-compose.prod.yml pull backend frontend

            echo "→ Running Alembic migrations..."
            IMAGE_TAG=${{ github.sha }} \
              docker compose -f docker-compose.prod.yml \
                run --rm --no-deps backend \
                alembic upgrade head

            echo "→ Bringing up all services..."
            IMAGE_TAG=${{ github.sha }} \
              docker compose -f docker-compose.prod.yml \
                up -d --remove-orphans

            echo "→ Waiting for health checks..."
            sleep 20

            echo "→ Verifying backend health..."
            curl -fsSL http://localhost/health | python3 -c "
            import sys, json
            data = json.load(sys.stdin)
            assert data.get('status') == 'healthy', f'Unexpected status: {data}'
            print('Backend health check passed:', data)
            "

            echo "→ Cleaning up old images..."
            docker image prune -f --filter "until=72h"

            echo "✓ Deployment complete — SHA: ${{ github.sha }}"

      - name: Deployment summary
        if: always()
        run: |
          echo "### Deployment Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** production" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

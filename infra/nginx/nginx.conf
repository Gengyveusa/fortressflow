# ============================================================
# FortressFlow — Production Nginx Configuration
# ============================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --------------------------------------------------------
    # Logging
    # --------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # --------------------------------------------------------
    # Performance
    # --------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    keepalive_requests 1000;
    server_tokens      off;

    # --------------------------------------------------------
    # Gzip Compression
    # --------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        text/css
        text/html
        text/javascript
        text/plain
        text/xml;

    # --------------------------------------------------------
    # Rate Limiting Zones
    # --------------------------------------------------------
    # General API rate limiting: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    # Stricter limit for authentication endpoints
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # --------------------------------------------------------
    # Upstream: Backend (FastAPI/Uvicorn)
    # --------------------------------------------------------
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # --------------------------------------------------------
    # Upstream: Frontend (Next.js)
    # --------------------------------------------------------
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    # --------------------------------------------------------
    # Server Block
    # --------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Maximum upload size
        client_max_body_size 10M;

        # Proxy timeouts
        proxy_connect_timeout   60s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;
        proxy_buffers           8 16k;
        proxy_buffer_size       32k;

        # --------------------------------------------------------
        # Security Headers (applied globally to all responses)
        # --------------------------------------------------------
        add_header X-Frame-Options            "DENY"                                          always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'unsafe-inline' 'unsafe-eval'; "
            "style-src 'self' 'unsafe-inline'; "
            "img-src 'self' data: https:; "
            "font-src 'self' data:; "
            "connect-src 'self'; "
            "frame-ancestors 'none';"                                                          always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains"           always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"       always;

        # --------------------------------------------------------
        # Common proxy header macro (inline — nginx doesn't have
        # true macros, so we repeat where needed)
        # --------------------------------------------------------

        # --------------------------------------------------------
        # /api/ → Backend
        # --------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;

            # Strip /api prefix before forwarding
            rewrite ^/api/(.*)$ /$1 break;
        }

        # --------------------------------------------------------
        # API Documentation → Backend
        # --------------------------------------------------------
        location ~ ^/(docs|redoc|openapi\.json)$ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --------------------------------------------------------
        # /metrics → Backend (internal network only)
        # --------------------------------------------------------
        location /metrics {
            # Restrict to internal Docker network (172.16.0.0/12 covers
            # all default Docker bridge and overlay subnets)
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny  all;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --------------------------------------------------------
        # /health → Backend (used by load balancers + Docker healthcheck)
        # --------------------------------------------------------
        location /health {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Disable access logging for health checks to reduce noise
            access_log off;
        }

        # --------------------------------------------------------
        # / → Frontend (Next.js)
        # --------------------------------------------------------
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;

            # Next.js static assets — aggressive caching
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass       http://frontend;
                proxy_set_header Host $host;
                expires          1y;
                add_header       Cache-Control "public, immutable";
                access_log       off;
            }
        }

        # --------------------------------------------------------
        # Error pages
        # --------------------------------------------------------
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}

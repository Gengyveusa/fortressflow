# ============================================================
# FortressFlow — Production Docker Compose
# ============================================================
# Usage:
#   cp .env.example .env.prod          # Fill in real secrets
#   docker compose -f docker-compose.prod.yml up -d
#
# All service images are built from source (no dev volume mounts).
# Source code is baked into images at build time.
# ============================================================

version: "3.9"

# ============================================================
# Networks
# ============================================================
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  monitoring_net:
    driver: bridge

# ============================================================
# Named Volumes (persistent data survives container restarts)
# ============================================================
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  loki_data:
  backup_data:

# ============================================================
# Services
# ============================================================
services:

  # ----------------------------------------------------------
  # PostgreSQL 16 — Production-tuned
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_DB: fortressflow
      POSTGRES_USER: fortressflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Performance tuning via initdb args
      POSTGRES_INITDB_ARGS: >-
        --auth-host=scram-sha-256
        --auth-local=scram-sha-256
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c max_connections=100
        -c log_min_duration_statement=1000
        -c log_connections=off
        -c log_disconnections=off
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortressflow -d fortressflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.25"
          memory: 256m

  # ----------------------------------------------------------
  # Redis 7 — LRU cache with memory cap
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --tcp-keepalive 60
        --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          cpus: "0.1"
          memory: 64m

  # ----------------------------------------------------------
  # RabbitMQ 3.13 — No management UI exposed in production
  # ----------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit log [{console,[{level,warning}]}]"
      RABBITMQ_PLUGINS: "rabbitmq_management,rabbitmq_prometheus"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          cpus: "0.1"
          memory: 128m

  # ----------------------------------------------------------
  # Backend — FastAPI (multi-stage build, 4 Uvicorn workers)
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: ghcr.io/${GITHUB_REPOSITORY:-fortressflow/fortressflow}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://fortressflow:${POSTGRES_PASSWORD}@postgres:5432/fortressflow
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      SECRET_KEY: ${SECRET_KEY}
      UNSUBSCRIBE_HMAC_KEY: ${UNSUBSCRIBE_HMAC_KEY}
      ENVIRONMENT: production
      SENTRY_DSN: ${SENTRY_DSN}
      HUBSPOT_API_KEY: ${HUBSPOT_API_KEY}
      HUBSPOT_APP_ID: ${HUBSPOT_APP_ID}
      HUBSPOT_BREEZE_ENABLED: ${HUBSPOT_BREEZE_ENABLED:-true}
      ZOOMINFO_CLIENT_ID: ${ZOOMINFO_CLIENT_ID}
      ZOOMINFO_CLIENT_SECRET: ${ZOOMINFO_CLIENT_SECRET}
      ZOOMINFO_API_KEY: ${ZOOMINFO_API_KEY}
      ZOOMINFO_COPILOT_ENABLED: ${ZOOMINFO_COPILOT_ENABLED:-true}
      APOLLO_API_KEY: ${APOLLO_API_KEY}
      APOLLO_AI_ENABLED: ${APOLLO_AI_ENABLED:-true}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL}
      SES_CONFIGURATION_SET: ${SES_CONFIGURATION_SET}
      SENDING_SUBDOMAIN: ${SENDING_SUBDOMAIN}
      IMAP_HOST: ${IMAP_HOST}
      IMAP_USER: ${IMAP_USER}
      IMAP_PASSWORD: ${IMAP_PASSWORD}
      LINKEDIN_OAUTH_CLIENT_ID: ${LINKEDIN_OAUTH_CLIENT_ID}
      LINKEDIN_OAUTH_CLIENT_SECRET: ${LINKEDIN_OAUTH_CLIENT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.25"
          memory: 256m

  # ----------------------------------------------------------
  # Worker — Celery (same image as backend, higher concurrency)
  # ----------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: ghcr.io/${GITHUB_REPOSITORY:-fortressflow/fortressflow}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://fortressflow:${POSTGRES_PASSWORD}@postgres:5432/fortressflow
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      SECRET_KEY: ${SECRET_KEY}
      UNSUBSCRIBE_HMAC_KEY: ${UNSUBSCRIBE_HMAC_KEY}
      ENVIRONMENT: production
      SENTRY_DSN: ${SENTRY_DSN}
      HUBSPOT_API_KEY: ${HUBSPOT_API_KEY}
      HUBSPOT_APP_ID: ${HUBSPOT_APP_ID}
      ZOOMINFO_CLIENT_ID: ${ZOOMINFO_CLIENT_ID}
      ZOOMINFO_CLIENT_SECRET: ${ZOOMINFO_CLIENT_SECRET}
      ZOOMINFO_API_KEY: ${ZOOMINFO_API_KEY}
      APOLLO_API_KEY: ${APOLLO_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL}
      SES_CONFIGURATION_SET: ${SES_CONFIGURATION_SET}
      SENDING_SUBDOMAIN: ${SENDING_SUBDOMAIN}
      IMAP_HOST: ${IMAP_HOST}
      IMAP_USER: ${IMAP_USER}
      IMAP_PASSWORD: ${IMAP_PASSWORD}
      LINKEDIN_OAUTH_CLIENT_ID: ${LINKEDIN_OAUTH_CLIENT_ID}
      LINKEDIN_OAUTH_CLIENT_SECRET: ${LINKEDIN_OAUTH_CLIENT_SECRET}
    command:
      - celery
      - -A
      - app.workers.celery_app
      - worker
      - --loglevel=warning
      - --concurrency=8
      - --max-tasks-per-child=500
      - --without-gossip
      - --without-mingle
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "0.5"
          memory: 512m

  # ----------------------------------------------------------
  # Frontend — Next.js (standalone output, no dev volumes)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-fortressflow/fortressflow}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      BACKEND_URL: http://backend:8000
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
        reservations:
          cpus: "0.1"
          memory: 128m

  # ----------------------------------------------------------
  # Nginx — Reverse proxy + TLS termination point
  # ----------------------------------------------------------
  nginx:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
      - monitoring_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m
        reservations:
          cpus: "0.05"
          memory: 32m

  # ----------------------------------------------------------
  # Prometheus — Metrics collection (no external port in prod)
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      - --web.enable-admin-api
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - backend_net
      - monitoring_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          cpus: "0.1"
          memory: 128m

  # ----------------------------------------------------------
  # Grafana — Dashboards (no external port in prod;
  #           access via nginx or SSH tunnel)
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    env_file: .env.prod
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_LOG_LEVEL: warn
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - monitoring_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
        reservations:
          cpus: "0.1"
          memory: 64m

  # ----------------------------------------------------------
  # Node Exporter — host OS metrics (CPU, memory, disk, network)
  # ----------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: fortressflow-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ----------------------------------------------------------
  # PostgreSQL Exporter — database metrics for Prometheus
  # ----------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: fortressflow-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-fortressflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fortressflow}?sslmode=disable"
    networks:
      - backend_net
      - monitoring_net
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ----------------------------------------------------------
  # Redis Exporter — Redis metrics for Prometheus
  # ----------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: fortressflow-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    networks:
      - backend_net
      - monitoring_net
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ----------------------------------------------------------
  # AlertManager — Prometheus alert routing and notification
  # ----------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: fortressflow-alertmanager
    restart: unless-stopped
    volumes:
      - ./infra/alertmanager:/etc/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - monitoring_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ----------------------------------------------------------
  # Loki — Log aggregation backend
  # ----------------------------------------------------------
  loki:
    image: grafana/loki:2.9.4
    container_name: fortressflow-loki
    restart: unless-stopped
    volumes:
      - ./infra/loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - monitoring_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ----------------------------------------------------------
  # Promtail — Log collector, ships to Loki
  # ----------------------------------------------------------
  promtail:
    image: grafana/promtail:2.9.4
    container_name: fortressflow-promtail
    restart: unless-stopped
    volumes:
      - ./infra/promtail:/etc/promtail
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - monitoring_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ----------------------------------------------------------
  # Database Backup — Automated PostgreSQL backups
  # ----------------------------------------------------------
  backup:
    build:
      context: ./infra/backup
      dockerfile: Dockerfile
    container_name: fortressflow-backup
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fortressflow}
      POSTGRES_DB: ${POSTGRES_DB:-fortressflow}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      AWS_S3_BACKUP_BUCKET: ${AWS_S3_BACKUP_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - backup_data:/backups
    networks:
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
